# Example override file for Nemotron Nano V2 VL

model:
  seq_length: 8192
  freeze_language_model: False
  freeze_vision_model: False
  freeze_vision_projection: False
  tensor_model_parallel_size: 2

train:
  train_iters: 510
  global_batch_size: 16
  micro_batch_size: 1
  eval_iters: 1
  eval_interval: 100

optimizer:
  lr: 2e-6
  min_lr: 2e-7

scheduler:
  lr_warmup_iters: 20

checkpoint:
  load: None
  save: /root/Megatron-Bridge/nemo_experiments/default/checkpoints_sft_full
  save_interval: 100

dist:
  use_megatron_fsdp: false
  use_torch_fsdp2: false

logger:
  log_interval: 10
  eval_dump_dir: /root/Megatron-Bridge/results/nemotron_nano_v2_vl_safewatch_datav2/eval_json
  eval_gt_jsonl_path: /gpfs/public/artifacts/SafeWatch-Bench-200K/sft_jsonl/sft_eval_v2.jsonl
  eval_dump_max_records: null  # optional; default 1. Use null for entire JSONL (can be slow on large files).

dataset:
  skip_test: true
  seq_length: 8192
  maker_name: make_safewatch_dataset
  maker_kwargs:
    train_jsonl_path: /gpfs/public/artifacts/SafeWatch-Bench-200K/sft_jsonl/sft_train_v2.jsonl
    eval_jsonl_path: /gpfs/public/artifacts/SafeWatch-Bench-200K/sft_jsonl/sft_eval_v2.jsonl
    require_video_exists: true

rng:
  seed: 42

ddp:
  grad_reduce_in_fp32: true


