# SimPO override file for Nemotron Nano V2 VL
#
# SimPO (Simple Preference Optimization) uses length-normalised average
# log-probability as an implicit reward, removing the need for a separate
# reference model.  Key differences from standard SFT:
#
#   * cross_entropy_loss_fusion MUST be False (model must return raw logits)
#   * micro_batch_size refers to the number of preference *pairs* — the
#     actual batch size seen by the model is 2× this value
#   * Lower learning rate is typically better for preference tuning

model:
  seq_length: 4096
  cross_entropy_loss_fusion: false
  freeze_language_model: false
  freeze_vision_model: true
  freeze_vision_projection: false

train:
  train_iters: 510
  global_batch_size: 16
  micro_batch_size: 1
  eval_iters: 1
  eval_interval: 100

optimizer:
  lr: 5e-7
  min_lr: 5e-8

scheduler:
  lr_warmup_iters: 10

checkpoint:
  save: /root/Megatron-Bridge/nemo_experiments/default/checkpoints_simpo_full
  save_interval: 100
  finetune: true

dist:
  use_megatron_fsdp: false
  use_torch_fsdp2: false

logger:
  log_interval: 1

rng:
  seed: 42

ddp:
  grad_reduce_in_fp32: true
